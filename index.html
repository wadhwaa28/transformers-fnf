// Deterministic melody variations — every recurrence of a phrase is transformed,
// so no section ever plays back exactly the same way twice.
function varyMel(mel,v){
 v=((v%4)+4)%4;
 if(v===0)return mel;
 const N=[];
 for(let k=0;k<mel.length;k+=3)N.push([mel[k],mel[k+1],mel[k+2]]);
 const out=[];
 if(v===1){ // densify: fill gaps with passing tones
  for(let i=0;i<N.length;i++){
   out.push(N[i]);
   const nx=N[i+1];
   if(nx&&nx[0]-N[i][0]>=2&&N[i][2]<=2)out.push([nx[0]-1,Math.round((N[i][1]+nx[1])/2),1]);
  }
 }else if(v===2){ // syncopate mid-beats + grace notes into downbeats
  for(const n of N){
   const st=n[0],dg=n[1],ln=n[2];
   if(st>0&&st%8===0)out.push([st-1,dg+1,1]);
   out.push([(st%8===4&&ln<=2&&st<31)?st+1:st,dg,ln]);
  }
 }else{ // octave lift on 2nd half + split long downbeats into 16th figures
  for(const n of N){
   const st=n[0],ln=n[2],d2=n[1]+(st>=16?7:0);
   if(ln>=2&&st%4===0&&st<30)out.push([st,d2,1],[st+1,d2+(st>=16?-1:1),1]);
   else out.push([st,d2,ln]);
  }
 }
 out.sort((a,b)=>a[0]-b[0]);
 const flat=[];
 for(const n of out)flat.push(n[0],n[1],n[2]);
 return flat;
}
// Double-tempo sections: quantize to even steps so real-time density stays humanly playable
function halfTime(mel){
 const out=[],seen={};
 for(let k=0;k<mel.length;k+=3){
  const st=mel[k],st2=st-(st%2);
  if(seen[st2]!==undefined&&seen[st2]!==st)continue;
  seen[st2]=st;
  out.push(st2,mel[k+1],mel[k+2]);
 }
 return out;
}

 def.st.forEach(sl=>{
  const ph=def.phrases[sl[0]];
  occ[sl[0]]=(occ[sl[0]]||0)+1;
  const ch=(ph.ch2&&occ[sl[0]]%2===0)?ph.ch2:ph.ch;
  const opts=sl[2]||"";
  const tr=(opts.indexOf("t")>=0||opts.indexOf("k")>=0)?2:0; // "k" = key change w/o tempo change
  const spd=opts.indexOf("t")>=0?0.5:1;
  barInfo.push({cd:ch[0],opts,tr,spd});
  barInfo.push({cd:ch[1],opts,tr,spd});
 });
 const lastTr=barInfo.length?barInfo[barInfo.length-1].tr:0;
 for(let ob=0;ob<def.outro;ob++)barInfo.push({cd:def.cadence?0:ph0.ch[ob%2],opts:"",tr:lastTr,spd:1});

try{const s=localStorage.getItem("tfg1_binds");if(s){const b=JSON.parse(s);if(Array.isArray(b)&&b.length===4)BINDS=b;}}catch(e){}
function saveBinds(){try{localStorage.setItem("tfg1_binds",JSON.stringify(BINDS));}catch(e){}}
function keyName(k){if(!k)return "—";const m={"arrowleft":"←","arrowdown":"↓","arrowup":"↑","arrowright":"→"," ":"SPACE"};return m[k]||k.toUpperCase();}
let bindSel=0,bindWait=false;
// song-clear tracking (persisted) — the boss unlocks after clearing everything else
let cleared={};
try{const c=localStorage.getItem("tfg1_clear");if(c)cleared=JSON.parse(c)||{};}catch(e){}
function saveClear(){try{localStorage.setItem("tfg1_clear",JSON.stringify(cleared));}catch(e){}}
const SPECMAP={}; // filled after the character specs are defined
function swapAt(ts){ // who is on stage at song-time ts (roster-relay songs)
 if(!def||!def.oppSwap||!song)return null;
 let b=0;while(b+1<song.bars.start.length&&song.bars.start[b+1]<=ts)b++;
 const si=Math.max(0,Math.floor((b-def.intro)/2));
 return {opp:def.oppSwap[Math.floor(si/4)%def.oppSwap.length],
         plr:def.plrSwap[Math.floor((si+2)/4)%def.plrSwap.length]};
}
function isLocked(i){
 if(!SONGS[i]||!SONGS[i].locked)return false;
 const pg=SONGS[i].page||1; // unlock only depends on songs from the same side
 return !SONGS.every((s,j)=>j===i||(s.page||1)!==pg||cleared[s.title]);
}

// ---- visual helpers ----
function shade(hex,f){const n=parseInt(hex.slice(1),16);
 const c=v=>Math.max(0,Math.min(255,Math.round(v*f)));
 return "rgb("+c(n>>16)+","+c((n>>8)&255)+","+c(n&255)+")";}
function vignette(g){
 const v=g.createRadialGradient(480,270,240,480,270,580);
 v.addColorStop(0,"rgba(0,0,0,0)");v.addColorStop(1,"rgba(0,0,0,0.5)");
 g.fillStyle=v;g.fillRect(0,0,W,H);
}
function drawInsignia(g,s,col){
 g.save();g.scale(s,s);g.fillStyle=col;
 g.beginPath();
 g.moveTo(0,-80);g.lineTo(-62,-30);g.lineTo(-44,66);g.lineTo(-14,44);g.lineTo(0,66);
 g.lineTo(14,44);g.lineTo(44,66);g.lineTo(62,-30);g.closePath();
 g.moveTo(0,-52);g.lineTo(-30,-24);g.lineTo(30,-24);g.closePath();
 g.rect(-26,-12,52,18);
 g.fill("evenodd");
 g.restore();
}

// ============ audio ============
function initAudio(){
 if(ac)return;
 ac=new (window.AudioContext||window.webkitAudioContext)();
 const comp=ac.createDynamicsCompressor();
 comp.threshold.value=-14;comp.ratio.value=4;
 masterGain=ac.createGain();masterGain.gain.value=0.6;
 masterGain.connect(comp);comp.connect(ac.destination);
 noiseBuf=ac.createBuffer(1,ac.sampleRate,ac.sampleRate);
 const d=noiseBuf.getChannelData(0);
 for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;
}
function env(g,t,a,peak,dur,rel){
 g.gain.setValueAtTime(0.0001,t);
 g.gain.linearRampToValueAtTime(peak,t+a);
 g.gain.setValueAtTime(peak,Math.max(t+a,t+dur-rel));
 g.gain.linearRampToValueAtTime(0.0001,t+dur);
}
function sKick(t,dest){
 const o=ac.createOscillator(),g=ac.createGain();
 o.type="sine";o.frequency.setValueAtTime(160,t);o.frequency.exponentialRampToValueAtTime(45,t+0.12);
 g.gain.setValueAtTime(0.9,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.25);
 o.connect(g);g.connect(dest||songGain);o.start(t);o.stop(t+0.3);
}
function sSnare(t,dest){
 const n=ac.createBufferSource();n.buffer=noiseBuf;
 const f=ac.createBiquadFilter();f.type="highpass";f.frequency.value=1500;
 const g=ac.createGain();g.gain.setValueAtTime(0.32,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.14);
 n.connect(f);f.connect(g);g.connect(dest||songGain);n.start(t);n.stop(t+0.16);
 const o=ac.createOscillator(),g2=ac.createGain();
 o.type="triangle";o.frequency.value=190;
 g2.gain.setValueAtTime(0.25,t);g2.gain.exponentialRampToValueAtTime(0.001,t+0.09);
 o.connect(g2);g2.connect(dest||songGain);o.start(t);o.stop(t+0.1);
}
function sHat(t,dest){
 const n=ac.createBufferSource();n.buffer=noiseBuf;
 const f=ac.createBiquadFilter();f.type="highpass";f.frequency.value=7500;
 const g=ac.createGain();g.gain.setValueAtTime(0.09,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.04);
 n.connect(f);f.connect(g);g.connect(dest||songGain);n.start(t);n.stop(t+0.05);
}
function sBass(t,m,d,dest){
 const o=ac.createOscillator(),f=ac.createBiquadFilter(),g=ac.createGain();
 o.type="sawtooth";o.frequency.value=m2f(m);
 f.type="lowpass";f.frequency.value=520;f.Q.value=1.2;
 env(g,t,0.01,0.2,d,0.05);
 o.connect(f);f.connect(g);g.connect(dest||songGain);o.start(t);o.stop(t+d+0.05);
}
function sPad(t,ms,d,dest){
 const f=ac.createBiquadFilter();f.type="lowpass";f.frequency.value=900;
 const g=ac.createGain();env(g,t,0.15,0.05,d,0.3);
 f.connect(g);g.connect(dest||songGain);
 for(const m of ms){
  const o=ac.createOscillator();o.type="sawtooth";o.frequency.value=m2f(m);
  o.detune.value=(Math.random()*8-4);
  o.connect(f);o.start(t);o.stop(t+d+0.1);
 }
}
function sVox(t,m,d,who,gs){
 gs=gs||1;
 // per-song voice casting — playing AS Optimus uses his existing (finale) voice,
 // and Nemesis sings the same voice pulled through the dark mirror
 if(def){
  if(who==="plr"&&def.plrSwap){ // the Autobot relay: every bot brings their own voice
   const sw3=swapAt(t-songStartAbs+0.01);
   if(sw3)who=({bumblebee:"bee",ironhide:"iron",ratchet:"med",jazz:"jazzv"})[sw3.plr]||def.plrVox||"plr";
   else who=def.plrVox||"plr";
  }
  else if(who==="plr"&&def.plrVox)who=def.plrVox;
  else if(who==="opp"&&def.oppSwap){
   const sw2=swapAt(t-songStartAbs+0.01);
   if(sw2)who=({nemesis:"nem",galvatron:"gal",unitron:"uni"})[sw2.opp]||"opp";
  }
  else if(who==="opp"&&def.oppVox){
   const st5=t-songStartAbs;
   if(pwrTm>=0&&st5>=pwrTm-0.01)who=def.pwrVox||def.oppVox;
   else if(morphT<0||st5>=morphT-0.01)who=def.oppVox;
  }
 }
 const f=ac.createBiquadFilter();f.type="lowpass";
 const g=ac.createGain();
 f.connect(g);g.connect(songGain);
 const lfo=ac.createOscillator(),lg=ac.createGain();
 lfo.frequency.value=5.5;lg.gain.value=7;lfo.connect(lg);lfo.start(t);lfo.stop(t+d+0.1);
 if(who==="opp"){
  f.frequency.value=1600;env(g,t,0.02,0.13*gs,d,0.06);
  for(const dt of [-6,6]){
   const o=ac.createOscillator();o.type="square";
   o.frequency.setValueAtTime(m2f(m)*0.975,t);
   o.frequency.exponentialRampToValueAtTime(m2f(m),t+0.05);
   o.detune.value=dt;lg.connect(o.detune);
   o.connect(f);o.start(t);o.stop(t+d+0.08);
  }
 }else if(who==="nem"){ // corrupted Prime: wider detune, sub-octave growl, darker filter
  f.frequency.value=1250;env(g,t,0.02,0.13*gs,d,0.06);
  for(const dt of [-14,14]){
   const o=ac.createOscillator();o.type="square";
   o.frequency.setValueAtTime(m2f(m)*1.03,t);
   o.frequency.exponentialRampToValueAtTime(m2f(m),t+0.07);
   o.detune.value=dt;lg.connect(o.detune);
   o.connect(f);o.start(t);o.stop(t+d+0.08);
  }
  const g3=ac.createGain();g3.gain.value=0.4;
  const os=ac.createOscillator();os.type="square";os.frequency.value=m2f(m-12);
  os.connect(g3);g3.connect(f);os.start(t);os.stop(t+d+0.08);
 }else if(who==="gal"){ // Galvatron: ring-modulated snarl through a sweeping
  // formant — inharmonic sidebands make a cracked, metallic, unhinged tone
  f.type="bandpass";f.frequency.setValueAtTime(1250,t);
  f.frequency.exponentialRampToValueAtTime(620,t+Math.min(d,0.3));f.Q.value=2.0;
  env(g,t,0.012,0.30*gs,d,0.05);
  const o=ac.createOscillator();o.type="sawtooth";
  o.frequency.setValueAtTime(m2f(m)*0.94,t);
  o.frequency.exponentialRampToValueAtTime(m2f(m),t+0.045);
  lg.connect(o.detune);
  const rm=ac.createGain();rm.gain.value=0; // ring modulator core
  const mo=ac.createOscillator();mo.type="sine";mo.frequency.value=m2f(m)*0.75*1.04;
  mo.connect(rm.gain);
  o.connect(rm);rm.connect(f);
  o.start(t);o.stop(t+d+0.08);mo.start(t);mo.stop(t+d+0.08);
  const o2=ac.createOscillator();o2.type="square";o2.frequency.value=m2f(m)*2; // bright snarl bed
  const g2=ac.createGain();g2.gain.value=0.18;o2.connect(g2);g2.connect(f);
  o2.start(t);o2.stop(t+d+0.08);
 }else if(who==="sax"){ // Ratticus 2.0: the saxobot — reedy, swung, smoky
  f.type="bandpass";f.frequency.value=900;f.Q.value=1.1;
  env(g,t,0.025,0.20*gs,d,0.07);
  for(const dt of [0,8]){
   const o=ac.createOscillator();o.type="sawtooth";
   o.frequency.setValueAtTime(m2f(m)*0.93,t);
   o.frequency.exponentialRampToValueAtTime(m2f(m),t+0.06);
   o.detune.value=dt;lg.connect(o.detune);
   o.connect(f);o.start(t);o.stop(t+d+0.08);
  }
  const o2=ac.createOscillator();o2.type="square"; // reed buzz an octave down
  o2.frequency.value=m2f(m-12);
  const g2=ac.createGain();g2.gain.value=0.15;o2.connect(g2);g2.connect(f);
  o2.start(t);o2.stop(t+d+0.08);
 }else if(who==="bee"){ // Bumblebee: small bot, big buzz — kazoo up an octave
  f.type="bandpass";f.frequency.value=2000;f.Q.value=0.9;
  env(g,t,0.012,0.15*gs,d,0.05);
  lg.gain.value=16;lfo.frequency.value=7.5; // fast, eager vibrato
  for(const dt of [0,10]){
   const o=ac.createOscillator();o.type="square";
   o.frequency.setValueAtTime(m2f(m+12)*0.95,t);
   o.frequency.exponentialRampToValueAtTime(m2f(m+12),t+0.03);
   o.detune.value=dt;lg.connect(o.detune);
   o.connect(f);o.start(t);o.stop(t+d+0.06);
  }
  const ob=ac.createOscillator();ob.type="sawtooth"; // the buzz under the chirp
  ob.frequency.value=m2f(m)*1.005;
  const gb=ac.createGain();gb.gain.value=0.35;ob.connect(gb);gb.connect(f);
  ob.start(t);ob.stop(t+d+0.06);
 }else if(who==="iron"){ // Ironhide: gravel and diesel — slow, low, armored
  f.frequency.value=850;env(g,t,0.05,0.17*gs,d,0.09);
  lg.gain.value=4;lfo.frequency.value=3.8; // slow heavy vibrato
  for(const dt of [-9,9]){
   const o=ac.createOscillator();o.type="sawtooth";
   o.frequency.setValueAtTime(m2f(m-12)*0.96,t);
   o.frequency.exponentialRampToValueAtTime(m2f(m-12),t+0.09);
   o.detune.value=dt;lg.connect(o.detune);
   o.connect(f);o.start(t);o.stop(t+d+0.1);
  }
  const gr=ac.createOscillator(),gg=ac.createGain(); // engine-block growl
  gr.type="square";gr.frequency.value=m2f(m-24);
  gg.gain.value=0.22;gr.connect(gg);gg.connect(f);
  gr.start(t);gr.stop(t+d+0.1);
 }else if(who==="med"){ // Ratchet: clinical precision — clean pulse, tight and nasal
  f.type="bandpass";f.frequency.value=1150;f.Q.value=1.4;
  env(g,t,0.008,0.16*gs,d,0.03); // scalpel attack, no bedside manner
  lg.gain.value=3;
  for(const dt of [0,4]){
   const o=ac.createOscillator();o.type="square";
   o.frequency.setValueAtTime(m2f(m),t); // lands EXACTLY on pitch — he checked
   o.detune.value=dt;lg.connect(o.detune);
   o.connect(f);o.start(t);o.stop(t+d+0.05);
  }
  const tick=ac.createOscillator(),tg3=ac.createGain(); // diagnostic ping overtone
  tick.type="sine";tick.frequency.value=m2f(m+24);
  tg3.gain.setValueAtTime(0.06,t);tg3.gain.setTargetAtTime(0,t+0.03,0.05);
  tick.connect(tg3);tg3.connect(g);tick.start(t);tick.stop(t+0.4);
 }else if(who==="jazzv"){ // Jazz: silk — glides into every note like it owes him money
  f.frequency.value=1400;env(g,t,0.04,0.15*gs,d,0.1);
  lg.gain.value=9;lfo.frequency.value=4.6; // wide crooner vibrato
  for(const dt of [-4,4]){
   const o=ac.createOscillator();o.type="triangle";
   o.frequency.setValueAtTime(m2f(m)*0.86,t); // the long slide up
   o.frequency.exponentialRampToValueAtTime(m2f(m),t+0.11);
   o.detune.value=dt;lg.connect(o.detune);
   o.connect(f);o.start(t);o.stop(t+d+0.12);
  }
  const sw4=ac.createOscillator(),sg4=ac.createGain(); // a whisper of saw for shine
  sw4.type="sawtooth";sw4.frequency.setValueAtTime(m2f(m)*0.86,t);
  sw4.frequency.exponentialRampToValueAtTime(m2f(m),t+0.11);
  sg4.gain.value=0.18;sw4.connect(sg4);sg4.connect(f);
  sw4.start(t);sw4.stop(t+d+0.12);
 }else if(who==="rat"){ // (retired chirp voice, kept for posterity)
  f.frequency.value=2600;env(g,t,0.006,0.13*gs,d,0.04);
  for(const dt of [0,18]){
   const o=ac.createOscillator();o.type="triangle";
   o.frequency.setValueAtTime(m2f(m)*0.88,t);
   o.frequency.exponentialRampToValueAtTime(m2f(m),t+0.025);
   o.detune.value=dt;lg.connect(o.detune);
   o.connect(f);o.start(t);o.stop(t+d+0.06);
  }
  const o2=ac.createOscillator();o2.type="sine";o2.frequency.value=m2f(m)*3.01;
  const g2=ac.createGain();g2.gain.value=0.15;o2.connect(g2);g2.connect(f);
  o2.start(t);o2.stop(t+d+0.06);
 }else if(who==="bf"){ // formant synthesis: a sung "beh" — bright saw pushed
  // through vowel resonances, a sine for chest, soft attack, tiny upward scoop
  f.frequency.value=4000;
  env(g,t,0.015,0.15*gs,d,0.05);
  const src=ac.createGain();src.gain.value=1;
  for(const dt of [0,6]){
   const o=ac.createOscillator();o.type="sawtooth";
   o.frequency.setValueAtTime(m2f(m)*0.96,t);
   o.frequency.exponentialRampToValueAtTime(m2f(m),t+0.035);
   o.detune.value=dt;lg.connect(o.detune);
   o.connect(src);o.start(t);o.stop(t+d+0.08);
  }
  for(const [ff,qq,gg2] of [[650,5,1.0],[1750,7,0.55],[2600,9,0.22]]){
   const bp=ac.createBiquadFilter();bp.type="bandpass";bp.frequency.value=ff;bp.Q.value=qq;
   const bg=ac.createGain();bg.gain.value=gg2;
   src.connect(bp);bp.connect(bg);bg.connect(f);
  }
  const ob=ac.createOscillator();ob.type="sine"; // chest fundamental
  ob.frequency.setValueAtTime(m2f(m)*0.96,t);
  ob.frequency.exponentialRampToValueAtTime(m2f(m),t+0.035);
  const body=ac.createGain();body.gain.value=0.35;ob.connect(body);body.connect(f);
  ob.start(t);ob.stop(t+d+0.08);
 }else if(who==="bot"){ // the copy: same throat, wrong firmware — formants shifted
  // down, servo-gated, and bent downward into every note
  f.frequency.value=3600;
  env(g,t,0.012,0.15*gs,d,0.05);
  const src=ac.createGain();src.gain.value=1;
  const gt=ac.createGain();gt.gain.value=0.72;
  const go=ac.createOscillator();go.type="square";go.frequency.value=11;
  const gg4=ac.createGain();gg4.gain.value=0.28;go.connect(gg4);gg4.connect(gt.gain);
  for(const dt of [-10,10]){
   const o=ac.createOscillator();o.type="sawtooth";
   o.frequency.setValueAtTime(m2f(m)*1.05,t);
   o.frequency.exponentialRampToValueAtTime(m2f(m),t+0.05);
   o.detune.value=dt;lg.connect(o.detune);
   o.connect(src);o.start(t);o.stop(t+d+0.08);
  }
  for(const [ff,qq,gg2] of [[520,5,1.0],[1400,7,0.5],[2900,10,0.28]]){
   const bp=ac.createBiquadFilter();bp.type="bandpass";bp.frequency.value=ff;bp.Q.value=qq;
   const bg=ac.createGain();bg.gain.value=gg2;
   src.connect(bp);bp.connect(bg);bg.connect(gt);
  }
  gt.connect(f);
  go.start(t);go.stop(t+d+0.08);
 }else if(who==="uni"){ // UNITRON: a planet given a throat — subharmonic god-voice
  // an octave-down square with a slow gravitational throb, a two-octave-down
  // saw underneath, and a thin metallic shimmer far above
  f.frequency.value=900;env(g,t,0.03,0.34*gs,d,0.09);
  const o=ac.createOscillator();o.type="square";o.frequency.value=m2f(m-12);
  lg.connect(o.detune);
  const tr2=ac.createGain();tr2.gain.value=0.55;
  const to=ac.createOscillator();to.type="sine";to.frequency.value=6.5;
  const tg3=ac.createGain();tg3.gain.value=0.45;to.connect(tg3);tg3.connect(tr2.gain);
  o.connect(tr2);tr2.connect(f);
  o.start(t);o.stop(t+d+0.1);to.start(t);to.stop(t+d+0.1);
  const os2=ac.createOscillator();os2.type="sawtooth";os2.frequency.value=m2f(m-24);
  const g4=ac.createGain();g4.gain.value=0.5;os2.connect(g4);g4.connect(f);
  os2.start(t);os2.stop(t+d+0.1);
  const sh2=ac.createOscillator();sh2.type="sine";sh2.frequency.value=m2f(m)*3.02;
  const g5=ac.createGain();g5.gain.value=0.10;sh2.connect(g5);g5.connect(f);
  sh2.start(t);sh2.stop(t+d+0.1);
 }else{
  f.frequency.value=2400;env(g,t,0.015,0.12*gs,d,0.06);
  const o=ac.createOscillator();o.type="sawtooth";o.frequency.value=m2f(m);
  lg.connect(o.detune);o.connect(f);o.start(t);o.stop(t+d+0.08);
  const o2=ac.createOscillator();o2.type="triangle";o2.frequency.value=m2f(m)*2;
  const g2=ac.createGain();g2.gain.value=0.35;o2.connect(g2);g2.connect(f);
  o2.start(t);o2.stop(t+d+0.08);
 }
}
function sMiss(){
 const t=ac.currentTime;
 const o=ac.createOscillator(),g=ac.createGain();
 o.type="sawtooth";o.frequency.setValueAtTime(280,t);o.frequency.exponentialRampToValueAtTime(120,t+0.18);
 g.gain.setValueAtTime(0.12,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.2);
 o.connect(g);g.connect(masterGain);o.start(t);o.stop(t+0.22);
}
function sBell(t,m,d,dest){ // counter-melody voice: soft bell above the vocals
 const o=ac.createOscillator(),o2=ac.createOscillator(),g=ac.createGain(),f=ac.createBiquadFilter();
 o.type="triangle";o.frequency.value=m2f(m);
 o2.type="sine";o2.frequency.value=m2f(m)*2.01;
 f.type="lowpass";f.frequency.value=3000;
 g.gain.setValueAtTime(0.055,t);g.gain.exponentialRampToValueAtTime(0.001,t+Math.max(d,0.25));
 const g2=ac.createGain();g2.gain.value=0.3;o2.connect(g2);g2.connect(f);
 o.connect(f);f.connect(g);g.connect(dest||songGain);
 o.start(t);o.stop(t+d+0.3);o2.start(t);o2.stop(t+d+0.3);
}
function sPluck(t,m,d,dest){
 const o=ac.createOscillator(),g=ac.createGain(),f=ac.createBiquadFilter();
 o.type="triangle";o.frequency.value=m2f(m);
 f.type="lowpass";f.frequency.value=2400;
 g.gain.setValueAtTime(0.07,t);g.gain.exponentialRampToValueAtTime(0.001,t+d);
 o.connect(f);f.connect(g);g.connect(dest||songGain);o.start(t);o.stop(t+d+0.05);
}

function stopMenuMusic(){if(menuGain){try{menuGain.disconnect();}catch(e){}menuGain=null;}}
function menuTick(){
 if(!ac)return;
 if(state!=="menu"&&state!=="home"&&state!=="custom"&&state!=="binds"&&state!=="results"&&state!=="gameover"){stopMenuMusic();return;}
 if(state==="binds"&&bindsReturn==="pause"){stopMenuMusic();return;} // paused context: stay silent
 const mood=state==="gameover"?"loss":"menu";
 if(menuGain&&menuMood!==mood)stopMenuMusic();
 if(!menuGain){
  menuGain=ac.createGain();menuGain.gain.value=0.75;menuGain.connect(masterGain);
  menuNextBar=ac.currentTime+0.05;menuBarIdx=0;menuMood=mood;
 }
 if(menuMood==="loss"){ // the dirge — slow tolls over a fallen field
  const bdL=4*60/64;
  while(menuNextBar<ac.currentTime+0.6){
   const t=menuNextBar,cd=[0,5,3,4][menuBarIdx%4];
   sPad(t,[MENUROOT-24+d2s(cd),MENUROOT-24+d2s(cd+2),MENUROOT-12+d2s(cd)],bdL,menuGain);
   sBell(t,MENUROOT-12+d2s(cd),1.8,menuGain);
   sBell(t,MENUROOT-12+d2s(cd),1.8,menuGain); // doubled — the toll must carry
   if(menuBarIdx%4===3){sBell(t+bdL*0.5,MENUROOT-24+d2s(cd),2.2,menuGain);sBell(t+bdL*0.5,MENUROOT-24+d2s(cd),2.2,menuGain);}
   sKick(t,menuGain);sKick(t+0.34,menuGain); // a heartbeat, refusing to quit
   sBass(t,MENUROOT-36+d2s(cd),bdL*0.9,menuGain);
   const melL=[[4,2,1,0],[2,1,0,-1],[1,0,-1,-3],[0,-1,-3,-4]][menuBarIdx%4];
   for(let i=0;i<4;i++)sPluck(t+i*bdL/4,MENUROOT+d2s(melL[i]),0.7,menuGain);
   menuNextBar+=bdL;menuBarIdx++;
  }
  return;
 }
 const bd=4*60/MENUBPM;
 while(menuNextBar<ac.currentTime+0.6){
  const t=menuNextBar,cd=MENUCH[menuBarIdx%4];
  sPad(t,[MENUROOT-12+d2s(cd),MENUROOT-12+d2s(cd+2),MENUROOT-12+d2s(cd+4)],bd,menuGain);
  sKick(t,menuGain);sKick(t+bd*0.5,menuGain);
  sSnare(t+bd*0.75,menuGain);
  for(let i=0;i<8;i++)sHat(t+i*bd/8,menuGain);
  sBass(t,MENUROOT-24+d2s(cd),bd*0.45,menuGain);
  sBass(t+bd*0.5,MENUROOT-24+d2s(cd),bd*0.4,menuGain);
  const arp=[0,2,4,2,0,2,4,6];
  for(let i=0;i<8;i++)
   sPluck(t+i*bd/8,MENUROOT+d2s(cd+arp[i])+(menuBarIdx%8>=4?12:0),0.28,menuGain);
  menuNextBar+=bd;menuBarIdx++;
 }
}
let pauseAC=null,pauseGain=null,pauseNextBar=0,pauseBarIdx=0;
function pauseTick(){ // its own little AudioContext — the main one is asleep
 const inPause=state==="pause"||(state==="binds"&&bindsReturn==="pause");
 if(!inPause){
  if(pauseGain){try{pauseGain.disconnect();}catch(e){}pauseGain=null;
   if(pauseAC){try{pauseAC.suspend();}catch(e){}}}
  return;
 }
 try{
  if(!pauseAC)pauseAC=new (window.AudioContext||window.webkitAudioContext)();
  if(pauseAC.state==="suspended")pauseAC.resume();
  if(!pauseGain){
   pauseGain=pauseAC.createGain();pauseGain.gain.value=0.5;pauseGain.connect(pauseAC.destination);
   pauseNextBar=pauseAC.currentTime+0.05;pauseBarIdx=0;
  }
  const bd=4*60/84; // unhurried — the war can wait
  while(pauseNextBar<pauseAC.currentTime+0.6){
   const t=pauseNextBar,ci=pauseBarIdx%4;
   const chord=[[0,4,7,11],[5,9,12,16],[-2,2,5,9],[3,7,10,14]][ci]; // maj7 wander
   for(const iv of chord){
    const o=pauseAC.createOscillator(),gn=pauseAC.createGain();
    o.type="triangle";o.frequency.value=196*Math.pow(2,iv/12);
    gn.gain.setValueAtTime(0,t);gn.gain.linearRampToValueAtTime(0.045,t+0.3);
    gn.gain.setTargetAtTime(0,t+bd*0.7,0.4);
    o.connect(gn);gn.connect(pauseGain);o.start(t);o.stop(t+bd+1.2);
   }
   const melP=[0,7,4,11,7,2,4,-1];
   for(let k=0;k<2;k++){
    const mt=t+k*bd/2,mn=melP[(pauseBarIdx*2+k)%8];
    const o=pauseAC.createOscillator(),gn=pauseAC.createGain();
    o.type="sine";o.frequency.value=392*Math.pow(2,mn/12);
    gn.gain.setValueAtTime(0.085,mt);gn.gain.setTargetAtTime(0,mt+0.02,0.2);
    o.connect(gn);gn.connect(pauseGain);o.start(mt);o.stop(mt+1.4);
   }
   pauseNextBar+=bd;pauseBarIdx++;
  }
 }catch(e){}
}
function schedEvent(e){
 const t=songStartAbs+e.t;
 if(e.f==="kick")sKick(t);
 else if(e.f==="snare")sSnare(t);
 else if(e.f==="hat")sHat(t);
 else if(e.f==="bass")sBass(t,e.m,e.d);
 else if(e.f==="pad")sPad(t,e.ms,e.d);
 else if(e.f==="pluck")sPluck(t,e.m,e.d);
 else if(e.f==="cm")sBell(t,e.m,e.d);
 else if(e.f==="vox")sVox(t,e.m,e.d,e.w,e.g);
}

}
function renderCustom(t){
 const bg=ctx.createLinearGradient(0,0,0,H);
 bg.addColorStop(0,"#070812");bg.addColorStop(1,"#131a33");
 ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
 const sp=ctx.createRadialGradient(720,320,20,720,320,300); // fitting-room spotlight
 sp.addColorStop(0,"rgba(255,240,200,0.18)");sp.addColorStop(1,"rgba(255,240,200,0)");
 ctx.fillStyle=sp;ctx.fillRect(0,0,W,H);
 ctx.textAlign="left";
 ctx.font="800 30px Arial";ctx.fillStyle="#ffb020";
 ctx.fillText("CHARACTER CUSTOMIZATION",70,64);
 ctx.font="15px Arial";ctx.fillStyle="#8a93b8";
 ctx.fillText("↑ ↓ — row   •   ← → — style   •   Esc — back   •   saved automatically",70,90);
 ctx.font="800 17px Arial";ctx.fillStyle="#aab4e8";
 ctx.fillText("← BACK",22,34);
 for(let i=0;i<KID_OPTS.length;i++){
  const y=150+i*88,sel=customSel===i;
  if(sel){ctx.fillStyle="rgba(255,176,32,0.10)";rr(ctx,56,y-24,478,76,10);ctx.fill();
   ctx.strokeStyle="#ffb020";ctx.lineWidth=2;rr(ctx,56,y-24,478,76,10);ctx.stroke();}
  ctx.font="700 19px Arial";ctx.fillStyle=sel?"#ffd888":"#8a93b8";
  ctx.fillText(KID_OPTS[i][0].toUpperCase(),74,y);
  const cols=KID_OPTS[i][1];
  for(let j=0;j<cols.length;j++){
   const cx2=90+j*52,cy2=y+26;
   ctx.fillStyle=cols[j];
   ctx.beginPath();ctx.arc(cx2,cy2,16,0,TAU);ctx.fill();
   ctx.strokeStyle="rgba(0,0,0,0.5)";ctx.lineWidth=2;
   ctx.beginPath();ctx.arc(cx2,cy2,16,0,TAU);ctx.stroke();
   if(KIDLOOK[i]===j){ctx.strokeStyle="#fff";ctx.lineWidth=3.5;
    ctx.beginPath();ctx.arc(cx2,cy2,20,0,TAU);ctx.stroke();}
  }
 }
 // the mirror moment
 const poses=["idle","left","idle","up","idle","right"];
 const pose=poses[Math.floor(t*1.1)%poses.length];
 drawKid(ctx,pose,720,480,1.55,Math.sin(t*3)*4,0,-1,0,undefined);
 ctx.textAlign="center";
 ctx.font="700 16px Arial";ctx.fillStyle="#6a7398";
 ctx.fillText("this is you.",720,522);
}
function frame(ts){
 const t=ts/1000;
 ctx.clearRect(0,0,W,H);
 try{
  rafT=t;
  if(warpT>=0){
   const wdz=t-warpT;
   if(wdz>=0.85&&warpDest){ // swap pages while the screen is pure white
    const dz=warpDest;warpDest=null;
    if(dz==="menu"){state="menu";selIdx=0;}
    else if(dz==="custom"){state="custom";customSel=0;}
    else{bindsReturn="home";state="binds";bindSel=0;bindWait=false;}
   }
   if(wdz>1.6)warpT=-1;
  }
  menuTick();pauseTick();
  if(state==="home")renderHome(t);
  else if(state==="custom")renderCustom(t);
  else if(state==="menu")renderMenu(t);
  else if(state==="binds")renderBinds(t);
  else if(state==="pause")renderPause(t);
  else if(state==="play"&&playing)renderPlay(t);
  else if(state==="results")renderResults(t);
  else if(state==="gameover")renderGameOver(t);
  else renderHome(t);
  if(warpT>=0){ // the blinding flash, in and out
   const wdz=t-warpT;
   const az=wdz<0.85?Math.min(1,Math.pow(wdz/0.8,2)):Math.max(0,1-(wdz-0.85)/0.7);
   if(az>0){ctx.fillStyle="rgba(255,250,238,"+az.toFixed(3)+")";ctx.fillRect(0,0,W,H);}
  }
 }catch(err){
  ctx.fillStyle="#fff";ctx.font="12px monospace";ctx.textAlign="left";
  ctx.fillText(String(err),10,20);
 }
 requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
// v3 — extended finale, unique intros, blaster/visor animations
