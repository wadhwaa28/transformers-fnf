       if(harm)audio.push({t,f:"vox",m:def.root+d2s(dg+2)+tr-12,d:vd,w:"opp",g:0.45});
      }
     }
    }
    if(who==="p"||who==="d"){
     plr.push({t:t2,lane:lane2,dur:dur2,midi:midi2,hit:false,missed:false,holding:false,grp:gid});
    }
   }
   if(big)audio.push({t,f:"pluck",m:midi+12,d:Math.max(ln*sdl*0.8,0.15)});
  }
 });
 // dedupe simultaneous same-lane notes (chord stamps can overlap encoded doubles)
 const dedupe=arr=>{
  arr.sort((a,b)=>a.t-b.t);
  const out=[];
  for(const n of arr){
   let dup=false;
   for(let j=out.length-1;j>=0&&n.t-out[j].t<0.01;j--)
    if(out[j].lane===n.lane){dup=true;break;}
   if(!dup)out.push(n);
  }
  return out;
 };
 opp=dedupe(opp);plr=dedupe(plr);
 // notes may play DURING a hold, but never in the held lane itself:
 // shift offenders to a free lane, or drop them
 const fixHolds=arr=>{
  const out=[];
  for(const n of arr){
   if(n.dur>0){out.push(n);continue;} // holds are immovable
   const cov=L=>arr.some(o=>o!==n&&o.dur>0&&o.lane===L&&o.t<n.t-0.011&&o.t+o.dur>n.t+0.011);
   if(cov(n.lane)){
    const simul=arr.filter(x=>Math.abs(x.t-n.t)<0.01&&x!==n).map(x=>x.lane);
    let L=(n.lane+1)%4,tries=0;
    while((cov(L)||simul.includes(L))&&tries<4){L=(L+1)%4;tries++;}
    if(tries<4){n.lane=L;out.push(n);}
   }else out.push(n);
  }
  return out;
 };
 opp=fixHolds(opp);plr=fixHolds(plr);
 // anti-jack: avoid same lane at tiny gaps (tracks last note per lane, chord-aware)
 for(const arr of [opp,plr]){
  const last=[-9,-9,-9,-9];
  for(const n of arr){
   const gap=n.t-last[n.lane];
   if(gap>0.011&&gap<0.13&&!(n.dur>0)){ // holds are immovable; only taps relocate
    const simul=arr.filter(x=>Math.abs(x.t-n.t)<0.01&&x!==n).map(x=>x.lane);
    const covered=L2=>arr.some(o=>o!==n&&o.dur>0&&o.lane===L2&&o.t<n.t-0.01&&o.t+o.dur>n.t-0.02);
    let L=(n.lane+1)%4,tries=0;
    while((simul.includes(L)||(n.t-last[L]>-0.001&&n.t-last[L]<0.13)||covered(L))&&tries<4){L=(L+1)%4;tries++;}
    if(tries<4)n.lane=L;
   }
   last[n.lane]=n.t;
  }
 }
 audio.sort((a,b)=>a.t-b.t);
 return {audio,opp,plr,total:totalT,sd,beat:sd*4,bars:{start:barStart,spd:barInfo.map(x=>x.spd)}};
}

function initAudio(){
 if(ac)return;
 ac=new (window.AudioContext||window.webkitAudioContext)();
 const comp=ac.createDynamicsCompressor();
 comp.threshold.value=-14;comp.ratio.value=4;
 masterGain=ac.createGain();masterGain.gain.value=0.6;
 masterGain.connect(comp);comp.connect(ac.destination);
 noiseBuf=ac.createBuffer(1,ac.sampleRate,ac.sampleRate);
 const d=noiseBuf.getChannelData(0);
 for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;
}
function env(g,t,a,peak,dur,rel){
 g.gain.setValueAtTime(0.0001,t);
 g.gain.linearRampToValueAtTime(peak,t+a);
 g.gain.setValueAtTime(peak,Math.max(t+a,t+dur-rel));
 g.gain.linearRampToValueAtTime(0.0001,t+dur);
}
function sKick(t,dest){
 const o=ac.createOscillator(),g=ac.createGain();
 o.type="sine";o.frequency.setValueAtTime(160,t);o.frequency.exponentialRampToValueAtTime(45,t+0.12);
 g.gain.setValueAtTime(0.9,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.25);
 o.connect(g);g.connect(dest||songGain);o.start(t);o.stop(t+0.3);
}
function sSnare(t,dest){
 const n=ac.createBufferSource();n.buffer=noiseBuf;
 const f=ac.createBiquadFilter();f.type="highpass";f.frequency.value=1500;
 const g=ac.createGain();g.gain.setValueAtTime(0.32,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.14);
 n.connect(f);f.connect(g);g.connect(dest||songGain);n.start(t);n.stop(t+0.16);
 const o=ac.createOscillator(),g2=ac.createGain();
 o.type="triangle";o.frequency.value=190;
 g2.gain.setValueAtTime(0.25,t);g2.gain.exponentialRampToValueAtTime(0.001,t+0.09);
 o.connect(g2);g2.connect(dest||songGain);o.start(t);o.stop(t+0.1);
}
function sHat(t,dest){
 const n=ac.createBufferSource();n.buffer=noiseBuf;
 const f=ac.createBiquadFilter();f.type="highpass";f.frequency.value=7500;
 const g=ac.createGain();g.gain.setValueAtTime(0.09,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.04);
 n.connect(f);f.connect(g);g.connect(dest||songGain);n.start(t);n.stop(t+0.05);
}
function sBass(t,m,d,dest){
 const o=ac.createOscillator(),f=ac.createBiquadFilter(),g=ac.createGain();
 o.type="sawtooth";o.frequency.value=m2f(m);
 f.type="lowpass";f.frequency.value=520;f.Q.value=1.2;
 env(g,t,0.01,0.2,d,0.05);
 o.connect(f);f.connect(g);g.connect(dest||songGain);o.start(t);o.stop(t+d+0.05);
}
function sPad(t,ms,d,dest){
 const f=ac.createBiquadFilter();f.type="lowpass";f.frequency.value=900;
 const g=ac.createGain();env(g,t,0.15,0.05,d,0.3);
 f.connect(g);g.connect(dest||songGain);
 for(const m of ms){
  const o=ac.createOscillator();o.type="sawtooth";o.frequency.value=m2f(m);
  o.detune.value=(Math.random()*8-4);
  o.connect(f);o.start(t);o.stop(t+d+0.1);
 }
}
function sVox(t,m,d,who,gs){
 gs=gs||1;
 const f=ac.createBiquadFilter();f.type="lowpass";
 const g=ac.createGain();
 f.connect(g);g.connect(songGain);
 const lfo=ac.createOscillator(),lg=ac.createGain();
 lfo.frequency.value=5.5;lg.gain.value=7;lfo.connect(lg);lfo.start(t);lfo.stop(t+d+0.1);
 if(who==="opp"){
  f.frequency.value=1600;env(g,t,0.02,0.13*gs,d,0.06);
  for(const dt of [-6,6]){
   const o=ac.createOscillator();o.type="square";
   o.frequency.setValueAtTime(m2f(m)*0.975,t);
   o.frequency.exponentialRampToValueAtTime(m2f(m),t+0.05);
   o.detune.value=dt;lg.connect(o.detune);
   o.connect(f);o.start(t);o.stop(t+d+0.08);
  }
 }else{
  f.frequency.value=2400;env(g,t,0.015,0.12*gs,d,0.06);
  const o=ac.createOscillator();o.type="sawtooth";o.frequency.value=m2f(m);
  lg.connect(o.detune);o.connect(f);o.start(t);o.stop(t+d+0.08);
  const o2=ac.createOscillator();o2.type="triangle";o2.frequency.value=m2f(m)*2;
  const g2=ac.createGain();g2.gain.value=0.35;o2.connect(g2);g2.connect(f);
  o2.start(t);o2.stop(t+d+0.08);
 }
}
function sMiss(){
 const t=ac.currentTime;
 const o=ac.createOscillator(),g=ac.createGain();
 o.type="sawtooth";o.frequency.setValueAtTime(280,t);o.frequency.exponentialRampToValueAtTime(120,t+0.18);
 g.gain.setValueAtTime(0.12,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.2);
 o.connect(g);g.connect(masterGain);o.start(t);o.stop(t+0.22);
}
function sBell(t,m,d,dest){ // counter-melody voice: soft bell above the vocals
 const o=ac.createOscillator(),o2=ac.createOscillator(),g=ac.createGain(),f=ac.createBiquadFilter();
 o.type="triangle";o.frequency.value=m2f(m);
 o2.type="sine";o2.frequency.value=m2f(m)*2.01;
 f.type="lowpass";f.frequency.value=3000;
 g.gain.setValueAtTime(0.055,t);g.gain.exponentialRampToValueAtTime(0.001,t+Math.max(d,0.25));
 const g2=ac.createGain();g2.gain.value=0.3;o2.connect(g2);g2.connect(f);
 o.connect(f);f.connect(g);g.connect(dest||songGain);
 o.start(t);o.stop(t+d+0.3);o2.start(t);o2.stop(t+d+0.3);
}
function sPluck(t,m,d,dest){
 const o=ac.createOscillator(),g=ac.createGain(),f=ac.createBiquadFilter();
 o.type="triangle";o.frequency.value=m2f(m);
 f.type="lowpass";f.frequency.value=2400;
 g.gain.setValueAtTime(0.07,t);g.gain.exponentialRampToValueAtTime(0.001,t+d);
 o.connect(f);f.connect(g);g.connect(dest||songGain);o.start(t);o.stop(t+d+0.05);
}

let menuGain=null,menuNextBar=0,menuBarIdx=0;
const MENUBPM=92,MENUROOT=69,MENUCH=[0,5,2,6];
function stopMenuMusic(){if(menuGain){try{menuGain.disconnect();}catch(e){}menuGain=null;}}
function menuTick(){
 if(!ac)return;
 if(state!=="menu"&&state!=="binds"&&state!=="results"&&state!=="gameover"){stopMenuMusic();return;}
 if(state==="binds"&&bindsReturn==="pause"){stopMenuMusic();return;} // paused context: stay silent
 if(!menuGain){
  menuGain=ac.createGain();menuGain.gain.value=0.75;menuGain.connect(masterGain);
  menuNextBar=ac.currentTime+0.05;menuBarIdx=0;
 }
 const bd=4*60/MENUBPM;
 while(menuNextBar<ac.currentTime+0.6){
  const t=menuNextBar,cd=MENUCH[menuBarIdx%4];
  sPad(t,[MENUROOT-12+d2s(cd),MENUROOT-12+d2s(cd+2),MENUROOT-12+d2s(cd+4)],bd,menuGain);
  sKick(t,menuGain);sKick(t+bd*0.5,menuGain);
  sSnare(t+bd*0.75,menuGain);
  for(let i=0;i<8;i++)sHat(t+i*bd/8,menuGain);
  sBass(t,MENUROOT-24+d2s(cd),bd*0.45,menuGain);
  sBass(t+bd*0.5,MENUROOT-24+d2s(cd),bd*0.4,menuGain);
  const arp=[0,2,4,2,0,2,4,6];
  for(let i=0;i<8;i++)
   sPluck(t+i*bd/8,MENUROOT+d2s(cd+arp[i])+(menuBarIdx%8>=4?12:0),0.28,menuGain);
  menuNextBar+=bd;menuBarIdx++;
 }
}
function schedEvent(e){
 const t=songStartAbs+e.t;
 if(e.f==="kick")sKick(t);
 else if(e.f==="snare")sSnare(t);
 else if(e.f==="hat")sHat(t);
 else if(e.f==="bass")sBass(t,e.m,e.d);
 else if(e.f==="pad")sPad(t,e.ms,e.d);
 else if(e.f==="pluck")sPluck(t,e.m,e.d);
 else if(e.f==="cm")sBell(t,e.m,e.d);
 else if(e.f==="vox")sVox(t,e.m,e.d,e.w,e.g);
}

   g.beginPath();g.moveTo(-18,-20);g.lineTo(-6,-4);g.lineTo(-12,8);g.stroke();}
 }else if(who==="optimus"){

function startSong(i){
 initAudio();
 if(ac.state==="suspended")ac.resume();
 stopMenuMusic();
 def=SONGS[i];song=buildSong(def);
 if(songGain)try{songGain.disconnect();}catch(e){}
 songGain=ac.createGain();songGain.gain.value=1;songGain.connect(masterGain);
 songStartAbs=ac.currentTime+1.0;aidx=0;
 health=0.5;score=0;combo=0;maxCombo=0;sicks=0;goods=0;bads=0;misses=0;accSum=0;accN=0;
 popups=[];parts=[];flashes=[[-9,-9,-9,-9],[-9,-9,-9,-9]];songBarIdx=0;
 oppPose="idle";plrPose="idle";oppPoseT=-9;plrPoseT=-9;plrMissT=-9;
 duoPose1="idle";duoPose2="idle";duoPoseT1=-9;duoPoseT2=-9;duoIcon=1;
 playing=true;state="play";
}
function stopSong(){
 playing=false;
 if(songGain){try{songGain.disconnect();}catch(e){}songGain=null;}
}
function endSong(){
 stopSong();
 const acc=accN?accSum/accN:0;
 let rank="D";
 if(misses===0&&acc>=0.97)rank="S+";
 else if(acc>=0.95)rank="S";else if(acc>=0.9)rank="A";
 else if(acc>=0.8)rank="B";else if(acc>=0.7)rank="C";
 resultData={score,acc,maxCombo,sicks,goods,bads,misses,rank,title:def.title};
 state="results";
}
function doMiss(){
 combo=0;misses++;accN++;
 health=Math.max(0,health-0.05);
 plrMissT=lastNow;
 popups.push({txt:"MISS",col:"#f55",t:lastNow});
 if(ac)sMiss();
 if(health<=0){stopSong();state="gameover";}
}
function judge(dt){
 const a=Math.abs(dt);
 if(a<0.05)return ["SICK!!","#4df7f7",350,1,0.023];
 if(a<0.1)return ["GOOD","#4df75a",200,0.78,0.016];
 return ["BAD","#f7b04d",50,0.4,0.004];
}
function keyLane(e){
 const k=e.key.toLowerCase();
 for(let i=0;i<4;i++)if(BINDS[i][0]===k||BINDS[i][1]===k)return i;
 return -1;
}
const heldKeys=[false,false,false,false];
function onHit(lane){
 if(!playing)return;
 const now=lastNow;
 let best=null,bestDt=1;
 for(const n of song.plr){
  if(n.hit||n.missed||n.lane!==lane)continue;
  const dt=n.t-now;
  if(dt>0.14)break;
  if(Math.abs(dt)<=0.14&&Math.abs(dt)<Math.abs(bestDt)){best=n;bestDt=dt;}
 }
 if(!best)return; // no ghost-tap penalty
 best.hit=true;
 const [txt,col,pts,accv,hp]=judge(bestDt);
 if(txt==="SICK!!")sicks++;else if(txt==="GOOD")goods++;else bads++;
 score+=pts;combo++;maxCombo=Math.max(maxCombo,combo);
 accSum+=accv;accN++;
 health=Math.min(1,health+hp);
 popups.push({txt,col,t:now});
 flashes[1][lane]=now;
 if(txt==="SICK!!")spawnSplash(PLRX[lane],RECY,LANECOL[lane],12);
 else if(txt==="GOOD")spawnSplash(PLRX[lane],RECY,LANECOL[lane],6);
 plrPose=["left","down","up","right"][lane];plrPoseT=now;
 // quantize: the sung note always sounds exactly on the chart time, never early/late
 sVox(Math.max(ac.currentTime,songStartAbs+best.t),best.midi,Math.max(best.dur,0.2),"plr");
 if(best.dur>0){best.holding=true;}
}
window.addEventListener("keydown",e=>{
 if(["ArrowLeft","ArrowDown","ArrowUp","ArrowRight"," "].includes(e.key))e.preventDefault();
 if(e.repeat)return;
 if(state==="menu"){
  initAudio();if(ac.state==="suspended")ac.resume();
  const N=SONGS.length+1;
  if(e.key==="ArrowUp"||e.key.toLowerCase()==="w")selIdx=(selIdx+N-1)%N;
  else if(e.key==="ArrowDown"||e.key.toLowerCase()==="s")selIdx=(selIdx+1)%N;
  else if(e.key==="Enter"){
   if(selIdx===SONGS.length){bindsReturn="menu";state="binds";bindSel=0;bindWait=false;}
   else startSong(selIdx);
  }
 }else if(state==="binds"){
  const k=e.key.toLowerCase();
  if(bindWait){
   if(k!=="escape"){
    const lane=Math.floor(bindSel/2),col=bindSel%2;
    for(let i=0;i<4;i++)for(let c=0;c<2;c++)if(BINDS[i][c]===k)BINDS[i][c]=null;
    BINDS[lane][col]=k;saveBinds();
   }
   bindWait=false;
  }else if(k==="escape"){state=bindsReturn;bindsReturn="menu";}
  else if(k==="r"){BINDS=DEFBINDS.map(r=>r.slice());saveBinds();}
  else if(k==="m"){ctrlMode=ctrlMode==="auto"?"pc":ctrlMode==="pc"?"mobile":"auto";saveCtrl();}
  else if(k==="l"){laneTint=laneTint==="on"?"off":"on";saveTint();}
  else if(k==="enter")bindWait=true;
  else if(k==="arrowup")bindSel=(bindSel+6)%8;
  else if(k==="arrowdown")bindSel=(bindSel+2)%8;
  else if(k==="arrowleft"||k==="arrowright")bindSel=bindSel%2?bindSel-1:bindSel+1;
 }else if(state==="pause"){
  const k=e.key.toLowerCase();
  if(k==="escape"){ac.resume();state="play";}
  else if(k==="arrowup"||k==="w")pauseSel=(pauseSel+2)%3;
  else if(k==="arrowdown"||k==="s")pauseSel=(pauseSel+1)%3;
  else if(k==="enter"){
   if(pauseSel===0){ac.resume();state="play";}
   else if(pauseSel===1){bindsReturn="pause";state="binds";bindSel=0;bindWait=false;}
   else{ac.resume();stopSong();state="menu";}
  }
 }else if(state==="play"){
  if(e.key==="Escape"){doPause();return;}
  const l=keyLane(e);
  if(l>=0){heldKeys[l]=true;onHit(l);}
 }else if(state==="results"){
  if(e.key==="Enter"||e.key==="Escape")state="menu";
 }else if(state==="gameover"){
  if(e.key==="Enter")startSong(SONGS.indexOf(def));
  else if(e.key==="Escape")state="menu";
 }
});

    pauseSel=ii;

    else{ac.resume();stopSong();state="menu";}

 }else if(state==="binds"){

 ctx.font="bold 24px Arial";ctx.fillStyle="#fff";ctx.textAlign="center";
 ctx.fillText(resultData.title,480,166);
 ctx.font="900 110px 'Arial Black',Arial";
 ctx.fillStyle=resultData.rank[0]==="S"?"#ffd84a":resultData.rank==="A"?"#4df75a":"#9ab";
 ctx.fillText(resultData.rank,480,310);
 ctx.font="bold 20px Arial";ctx.fillStyle="#dcd";
 ctx.fillText("Score "+resultData.score+"    Accuracy "+(resultData.acc*100).toFixed(1)+"%    Max combo "+resultData.maxCombo,480,370);
 ctx.fillText("Sick "+resultData.sicks+"   Good "+resultData.goods+"   Bad "+resultData.bads+"   Miss "+resultData.misses,480,402);
 ctx.font="16px Arial";ctx.fillStyle="#9a92b5";
 ctx.fillText(isTouchUI()?"Tap — back to menu":"Enter / click — back to menu",480,470);
}
function renderGameOver(t){
 ctx.fillStyle="#08060e";ctx.fillRect(0,0,W,H);
 for(let i=0;i<40;i++){
  ctx.globalAlpha=0.2+0.3*Math.abs(Math.sin(t+i));
  ctx.fillStyle="#456";ctx.fillRect(hashRand(i)*W,hashRand(i+9)*H,2,2);
 }
 ctx.globalAlpha=1;
 drawKid(ctx,"down",480,400,1.1,Math.sin(t*4)*3,0.4,0);
 metalText(ctx,"STASIS LOCK",480,140,52,"#607090","#3050a0");
 ctx.font="bold 18px Arial";ctx.textAlign="center";
 ctx.fillStyle="#aab";
 ctx.fillText('"'+(def&&def.opp==="optimus"?"You fought bravely. Rise, and try again.":def&&def.opp==="shockwave"?"As calculated. Your victory probability remains negligible.":def&&def.opp==="soundwave"?"Soundwave superior. Challenger inferior. Rewind and retry.":def&&def.opp==="duo"?"Two channels. Zero chance. Transmission ends.":"Not bad, kid — wanna go again?")+'"',480,180);
 ctx.font="16px Arial";ctx.fillStyle="#889";
 ctx.fillText(isTouchUI()?"Tap — retry":"Enter — retry    •    Esc — menu",480,480);
}
function frame(ts){
 const t=ts/1000;
 ctx.clearRect(0,0,W,H);
 try{
  menuTick();
  if(state==="menu")renderMenu(t);
  else if(state==="binds")renderBinds(t);
  else if(state==="pause")renderPause(t);
  else if(state==="play"&&playing)renderPlay(t);
  else if(state==="results")renderResults(t);
  else if(state==="gameover")renderGameOver(t);
  else renderMenu(t);
 }catch(err){
  ctx.fillStyle="#fff";ctx.font="12px monospace";ctx.textAlign="left";
  ctx.fillText(String(err),10,20);
 }
 requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
// v3 — extended finale, unique intros, blaster/visor animations
</script>
